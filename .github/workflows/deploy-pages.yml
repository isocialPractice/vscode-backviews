name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vscode-backviews
        uses: actions/checkout@v4
        with:
          path: vscode-backviews

      - name: Checkout cmd-backedges dependency
        uses: actions/checkout@v4
        with:
          repository: isocialPractice/cmd-backedges
          path: cmd-backedges

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        working-directory: vscode-backviews
        run: npm install

      - name: Build webview bundle
        working-directory: vscode-backviews
        run: npm run build

      - name: Prepare deployment directory
        working-directory: vscode-backviews
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r media _site/
          cp -r materials _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: vscode-backviews/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
